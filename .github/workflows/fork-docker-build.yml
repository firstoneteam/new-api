name: Fork build & push (DockerHub youaijj)

# Fork-specific image build that publishes to the maintainer's own Docker Hub
# namespace (youaijj/new-api) instead of the upstream calciumion/new-api.
# Manually triggered; builds native linux/amd64 to match the ECI cluster.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 20260719-overview)'
        required: true
        type: string

jobs:
  build_and_push:
    name: Build & push (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Write VERSION
        run: |
          echo "${{ github.event.inputs.tag }}" > VERSION
          echo "Building tag: ${{ github.event.inputs.tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            youaijj/new-api:${{ github.event.inputs.tag }}
            youaijj/new-api:latest-fork
          cache-from: type=gha
          cache-to: type=gha,mode=max
